  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Weighing Bridge Pass</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Arvo:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      --sidebar: #0f172a;
      --sidebar-hover: #1e293b;
      --primary: #2563eb;
      --primary-light: #3b82f6;
      --accent: #f97316;
      --success: #10b981;
      --danger: #ef4444;
      --purple: #8b5cf6;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 12px 40px rgba(15, 23, 42, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      z-index: 100;
      box-shadow: 4px 0 24px rgba(0,0,0,0.15);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 24px;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--purple));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
    }

    .brand h2 {
      color: white;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
    }

    .brand span {
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      font-weight: 500;
    }

    .nav-label {
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0 12px;
      margin-bottom: 10px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      border-radius: 10px;
      margin-bottom: 4px;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .nav-item:hover {
      background: var(--sidebar-hover);
      color: white;
    }

    .nav-item.active {
      background: linear-gradient(135deg, var(--primary), #1d4ed8);
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
    }

    .nav-item i { width: 20px; text-align: center; }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 16px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.25);
      color: #fecaca;
    }

    /* Main content */
    .main {
      margin-left: 260px;
      flex: 1;
      padding: 28px 32px;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .topbar h1 {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
    }

    .topbar p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .topbar-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .session-badge {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      color: #92400e;
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #1d4ed8);
      color: white;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45);
    }

    /* Stats cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
    }

    .stat-card.blue::before { background: linear-gradient(90deg, var(--primary), var(--primary-light)); }
    .stat-card.orange::before { background: linear-gradient(90deg, var(--accent), #fb923c); }
    .stat-card.green::before { background: linear-gradient(90deg, var(--success), #34d399); }
    .stat-card.purple::before { background: linear-gradient(90deg, var(--purple), #a78bfa); }

    .stat-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .stat-card.blue .stat-icon { background: rgba(37, 99, 235, 0.1); color: var(--primary); }
    .stat-card.orange .stat-icon { background: rgba(249, 115, 22, 0.1); color: var(--accent); }
    .stat-card.green .stat-icon { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .stat-card.purple .stat-icon { background: rgba(139, 92, 246, 0.1); color: var(--purple); }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    /* Content grid */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
    }

    @media (max-width: 1100px) {
      .content-grid { grid-template-columns: 1fr; }
    }

    /* Table card */
    .table-card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .table-header {
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .table-header h3 {
      font-size: 18px;
      font-weight: 700;
    }

    .search-box {
      position: relative;
    }

    .search-box i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
    }

    .search-box input {
      padding: 10px 14px 10px 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      width: 260px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #f8fafc;
    }

    th {
      padding: 14px 20px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      padding: 16px 20px;
      font-size: 14px;
      border-top: 1px solid var(--border);
    }

    tbody tr {
      transition: background 0.15s ease;
    }

    tbody tr:hover {
      background: #f8fafc;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(37, 99, 235, 0.1);
      color: var(--primary);
    }

    .net-weight {
      font-weight: 700;
      color: var(--accent);
    }

    .delete-btn {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .delete-btn:hover {
      background: var(--danger);
      color: white;
    }

    .pdf-btn {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-right: 6px;
    }

    .pdf-btn:hover {
      background: var(--success);
      color: white;
    }

    .action-btns {
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .pass-box {
      width: 600px;
      height: 315px;
      background-color: #ffffff;
      border: 1px solid #333;
      margin: 20px auto;
      font-family: 'Courier New', Courier, monospace;
    }

    .note-cell {
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--muted);
      font-size: 13px;
    }

    .note-cell:hover {
      white-space: normal;
      overflow: visible;
      color: var(--text);
    }

    #pdfContainer {
      position: fixed;
      left: -9999px;
      top: 0;
      width: 200mm;
      min-height: 200mm;
      padding: 10mm 20mm;
      background: white;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* Material chart card */
    .chart-card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 24px;
    }

    .chart-card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .material-bar {
      margin-bottom: 16px;
    }

    .material-bar-header {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .material-bar-header span:first-child {
      font-weight: 600;
    }

    .material-bar-header span:last-child {
      color: var(--muted);
    }

    .bar-track {
      height: 8px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--primary), var(--purple));
      transition: width 0.6s ease;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        min-height: auto;
        position: relative;
        flex-direction: row;
        flex-wrap: wrap;
        padding: 16px;
      }
      .brand { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
      .nav-label, .sidebar-footer { display: none; }
      .nav-items { display: flex; gap: 8px; flex-wrap: wrap; }
      .main { margin-left: 0; padding: 20px 16px; }
      .search-box input { width: 100%; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-weight-hanging"></i></div>
      <div>
        <h2>KATO Bridge</h2>
        <span>Chikhli Weighing</span>
      </div>
    </div>

    <div class="nav-label">Menu</div>
    <nav class="nav-items">
      <a href="dashboard.html" class="nav-item active">
        <i class="fas fa-chart-pie"></i> Dashboard
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1>Dashboard</h1>
        <p>Overview of all weighing bridge passes</p>
      </div>
      <div class="topbar-actions">
        <div class="session-badge">
          <i class="fas fa-clock"></i>
          <span id="sessionTimer">30:00</span>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card blue">
        <div class="stat-header">
          <div>
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">Total Passes</div>
          </div>
          <div class="stat-icon"><i class="fas fa-receipt"></i></div>
        </div>
      </div>
      <div class="stat-card orange">
        <div class="stat-header">
          <div>
            <div class="stat-value" id="statToday">0</div>
            <div class="stat-label">Today's Passes</div>
          </div>
          <div class="stat-icon"><i class="fas fa-calendar-day"></i></div>
        </div>
      </div>
      <div class="stat-card green">
        <div class="stat-header">
          <div>
            <div class="stat-value" id="statNet">0</div>
            <div class="stat-label">Total Net Weight (T)</div>
          </div>
          <div class="stat-icon"><i class="fas fa-balance-scale"></i></div>
        </div>
      </div>
      <div class="stat-card purple">
        <div class="stat-header">
          <div>
            <div class="stat-value" id="statVehicles">0</div>
            <div class="stat-label">Unique Vehicles</div>
          </div>
          <div class="stat-icon"><i class="fas fa-truck"></i></div>
        </div>
      </div>
    </div>

    <div class="content-grid">
      <div class="table-card">
        <div class="table-header">
          <h3><i class="fas fa-list"></i> Recent Passes</h3>
          <div style="display: flex; gap: 12px; align-items: center;">
            <input type="month" id="monthInput" onchange="loadPasses()" title="Filter by Month" style="padding: 9px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; font-family: inherit; color: var(--text); background: white;">
            <div class="search-box">
              <i class="fas fa-search"></i>
              <input type="text" id="searchInput" placeholder="Search SR, vehicle, material, note..." oninput="loadPasses()">
            </div>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>SR No</th>
                <th>Vehicle</th>
                <th>Material</th>
                <th>Gross</th>
                <th>Tare</th>
                <th>Net</th>
                <th>Note</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="passesTable">
              <tr><td colspan="10" class="empty-state"><i class="fas fa-inbox"></i><br>Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="chart-card">
        <h3><i class="fas fa-chart-bar"></i> Material Breakdown</h3>
        <div id="materialChart">
          <div class="empty-state" style="padding: 30px;">
            <i class="fas fa-chart-pie"></i><br>No data yet
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="pdfContainer"></div>

  <script>
    const SESSION_KEY = 'katoLoggedIn';
    const AUTO_LOGOUT_MS = 30 * 60 * 1000;
    let autoLogoutTimer = null;
    let countdownInterval = null;
    let remainingMs = AUTO_LOGOUT_MS;

    function logout() {
      sessionStorage.removeItem(SESSION_KEY);
      window.location.href = 'index.html';
    }

    function resetAutoLogoutTimer() {
      remainingMs = AUTO_LOGOUT_MS;
      if (autoLogoutTimer) clearTimeout(autoLogoutTimer);
      autoLogoutTimer = setTimeout(function() {
        alert('Session expired. You have been logged out after 30 minutes.');
        logout();
      }, AUTO_LOGOUT_MS);
    }

    function updateCountdown() {
      const mins = Math.floor(remainingMs / 60000);
      const secs = Math.floor((remainingMs % 60000) / 1000);
      document.getElementById('sessionTimer').textContent =
        mins + ':' + String(secs).padStart(2, '0');
      remainingMs -= 1000;
      if (remainingMs < 0) remainingMs = 0;
    }

    function checkAuth() {
      if (sessionStorage.getItem(SESSION_KEY) !== 'true' || sessionStorage.getItem('katoUser') !== 'shivbhumi') {
        window.location.href = 'index.html';
        return false;
      }
      resetAutoLogoutTimer();
      countdownInterval = setInterval(updateCountdown, 1000);
      updateCountdown();
      return true;
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const data = await res.json();
        document.getElementById('statTotal').textContent = data.total;
        document.getElementById('statToday').textContent = data.today;
        document.getElementById('statNet').textContent = data.totalNet;
        document.getElementById('statVehicles').textContent = data.vehicles;
      } catch (e) {
        console.error('Failed to load stats', e);
      }
    }

    async function loadMaterialChart() {
      try {
        const res = await fetch('/api/material-stats');
        const data = await res.json();
        const container = document.getElementById('materialChart');

        if (!data.length) {
          container.innerHTML = '<div class="empty-state" style="padding:30px"><i class="fas fa-chart-pie"></i><br>No data yet</div>';
          return;
        }

        const maxCount = Math.max(...data.map(d => d.count));
        container.innerHTML = data.map(item => `
          <div class="material-bar">
            <div class="material-bar-header">
              <span>${item.material || 'Unknown'}</span>
              <span>${item.count} passes · ${Number(item.total_net || 0).toFixed(3)} T</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill" style="width: ${(item.count / maxCount) * 100}%"></div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error('Failed to load chart', e);
      }
    }

    async function loadPasses() {
      const search = document.getElementById('searchInput').value;
      const month = document.getElementById('monthInput') ? document.getElementById('monthInput').value : '';
      const tbody = document.getElementById('passesTable');

      try {
        const url = '/api/passes?search=' + encodeURIComponent(search) + '&month=' + encodeURIComponent(month);
        const res = await fetch(url);
        const passes = await res.json();

        if (!passes.length) {
          tbody.innerHTML = '<tr><td colspan="10" class="empty-state"><i class="fas fa-inbox"></i><br>No passes found</td></tr>';
          return;
        }

        tbody.innerHTML = passes.map(p => `
          <tr>
            <td><span class="badge">${p.srno}</span></td>
            <td><strong>${p.vehicleno}</strong></td>
            <td>${p.material || '-'}</td>
            <td>${Number(p.grosswt).toFixed(3)}</td>
            <td>${Number(p.tarewt).toFixed(3)}</td>
            <td class="net-weight">${Number(p.netwt).toFixed(3)}</td>
            <td class="note-cell" title="${(p.note || '').replace(/"/g, '&quot;')}">${p.note || '-'}</td>
            <td>${p.pass_date || '-'} ${p.pass_time || ''}</td>
            <td>
              <div class="action-btns">
                <button class="pdf-btn" onclick="downloadPassPDF('${p.id}')" title="Download PDF">
                  <i class="fas fa-file-pdf"></i>
                </button>
                <button class="delete-btn" onclick="deletePass('${p.id}')" title="Delete">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="10" class="empty-state">Could not connect to server. Run: npm start</td></tr>';
      }
    }

    function formatPassDateTime(pass) {
      if (pass.pass_date && pass.pass_time) {
        const dateParts = pass.pass_date.split('-').reverse().join('/');
        return dateParts + ' ' + pass.pass_time;
      }
      return pass.created_at || '-';
    }

    function generatePassHTML(srno, datetime, vehicleno, material, roypass, grosswt, tarewt, netwt) {
      return `
        <div>
          <div class="pass-box">
            <div>
              <div style="margin:0;padding-left:175px;padding-bottom:18px;">
                <div style="font-family:'Arvo',serif;font-weight:700;font-size:20px;"><u>WEIGHING BRIDGE PASS</u></div>
                <div style="font-family:'Arvo',serif;font-weight:700;font-size:14px;padding-left:100px;">CHIKHLI</div>
              </div>
              <div style="font-family:'Courier New',Courier,monospace;">
                <div style="display:flex;justify-content:space-between;font-size:14px;border-top:1px solid #000;padding-left:8px;">
                  <span><strong>SR. NO. :</strong> <strong>${srno}</strong></span>
                  <span style="padding-right:8px;"><strong>CHL.NO. :</strong> <strong>${srno}</strong></span>
                </div>
                <div style="padding-left:8px;padding-bottom:16px;">
                  <div style="font-size:15px;">DATE : ${datetime}</div>
                  <div style="font-size:15px;"><strong>PARTY NAME : CASE PAYMENT</strong></div>
                  <div style="font-size:15px;">SITE : SURAT</div>
                </div>
              </div>
              <div style="font-family:'Courier New',Courier,monospace;border-top:1px solid #000;padding-left:8px;padding-bottom:16px;font-size:14px;">
                VEHICLE NO. : ${vehicleno.toUpperCase()}
              </div>
              <div style="font-family:'Courier New',Courier,monospace;border-top:1px solid #000;padding-left:8px;padding-bottom:16px;font-size:14px;">
                <div style="display:flex;justify-content:space-between;">
                  <span>MATERIAL : ${material}</span>
                  <span style="padding-right:8px;">GROSS WT. : ${parseFloat(grosswt).toFixed(3)}</span>
                </div>
                <div style="display:flex;justify-content:space-between;">
                  <span>ROY. PASS NO. : ${roypass}</span>
                  <span style="padding-right:8px;">TARE WT. : ${parseFloat(tarewt).toFixed(3)}</span>
                </div>
                <div style="display:flex;justify-content:space-between;">
                  <span>LOADING BY :</span>
                  <span style="padding-right:8px;"><strong>NET WT. :</strong> ${netwt}</span>
                </div>
              </div>
              <div style="font-family:'Courier New',Courier,monospace;border-top:1px solid #000;padding-left:8px;padding-bottom:16px;font-size:14px;">
                RECEIVER'S SIGN : _____________________
              </div>
            </div>
          </div>
        </div>`;
    }

    async function downloadPassPDF(id) {
      try {
        const res = await fetch('/api/passes/' + id);
        if (!res.ok) throw new Error('Pass not found');
        const p = await res.json();
        const datetime = formatPassDateTime(p);
        const netwt = Number(p.netwt).toFixed(3);

        let html = '';
        for (let i = 0; i < 3; i++) {
          html += generatePassHTML(p.srno, datetime, p.vehicleno, p.material, p.roypass, p.grosswt, p.tarewt, netwt);
          if (i < 2) {
            html += '<div style="border-top:2px dashed #94a3b8;margin:32px 0;"></div>';
          }
        }

        const container = document.getElementById('pdfContainer');
        container.innerHTML = html;

        const opt = {
          margin: 0,
          filename: 'Pass_' + p.srno + '_' + p.vehicleno + '.pdf',
          html2canvas: { scale: 2 },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        await html2pdf().set(opt).from(container).save();
        container.innerHTML = '';
      } catch (e) {
        alert('Failed to download PDF. Please try again.');
        console.error(e);
      }
    }

    async function deletePass(id) {
      if (!confirm('Delete this pass record?')) return;
      await fetch('/api/passes/' + id, { method: 'DELETE' });
      loadPasses();
      loadStats();
      loadMaterialChart();
    }

    document.addEventListener('DOMContentLoaded', function() {
      if (!checkAuth()) return;
      loadStats();
      loadPasses();
      loadMaterialChart();
    });
  </script>
</body>
</html>
